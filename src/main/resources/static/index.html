<!--
    index.html
    Página inicial do MeuVoo. Permite ao usuário buscar passagens aéreas
    de duas formas: por rota (origem/destino/data) ou por orçamento.
    Exibe os resultados da busca e possibilita adicionar voos ao carrinho.
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeuVoo · Passagens aéreas</title>

    <!-- Favicon - Ícone do site (foot.png da pasta Public/Favicon) -->
    <link rel="icon" type="image/png" sizes="32x32" href="Public/Favicon/foot.png">
    <link rel="icon" type="image/png" sizes="16x16" href="Public/Favicon/foot.png">
    <link rel="shortcut icon" type="image/png" href="Public/Favicon/foot.png">
    <link rel="apple-touch-icon" type="image/png" href="Public/Favicon/foot.png">

    <link rel="stylesheet" href="Public/Styles/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-wrapper">
    <header class="main-header">
        <div class="header-container">
            <div class="logo">MeuVoo</div>
            <div class="user-area" id="authHeaderArea"></div>
        </div>
    </header>

    <nav class="nav-bar">
        <ul class="nav-links">
            <li class="active"><a href="index.html">Passagens</a></li>
            <li><a href="Public/carrinho.html">Carrinho</a></li>
            <li><a href="Public/checkin.html">Check-in</a></li>
            <li><a href="Public/minhas-viagens.html">Minhas viagens</a></li>
        </ul>
    </nav>

    <main class="search-hero">
        <div class="search-container">
            <div class="search-card">
                <div class="search-header">
                    <h1>Passagens aéreas</h1>
                    <div class="search-mode-toggle">
                        <button type="button" class="mode-btn active" data-mode="route">✈️ Buscar por rota</button>
                        <button type="button" class="mode-btn" data-mode="price">💰 Recomendar por preço</button>
                    </div>
                </div>

                <form id="flightSearchForm" class="flight-form">
                    <div class="form-row mode-fields" id="routeFields">
                        <div class="input-field">
                            <label for="from">Origem</label>
                            <div class="input-icon">
                                <input type="text" id="from" name="from" placeholder="Cidade ou aeroporto" list="cidadesList" required>
                            </div>
                        </div>

                        <div class="swap-icon-wrapper">
                            <button type="button" class="swap-btn" aria-label="Inverter origem e destino">⇄</button>
                        </div>

                        <div class="input-field">
                            <label for="to">Destino</label>
                            <div class="input-icon">
                                <input type="text" id="to" name="to" placeholder="Cidade ou aeroporto" list="cidadesList" required>
                            </div>
                        </div>

                        <div class="input-field">
                            <label for="date">Data de ida</label>
                            <div class="input-icon">
                                <input type="date" id="date" name="date" required>
                            </div>
                        </div>

                        <div class="input-field" id="routePassengerField">
                            <label for="passengersTrigger">Passageiros / Classe</label>
                            <div class="passenger-selector">
                                <div class="selector-trigger" id="passengersTrigger">
                                    <span id="passengersDisplay">1 passageiro, Econômica</span>
                                    <span class="arrow">▼</span>
                                </div>
                                <div class="selector-dropdown" id="passengersDropdown">
                                    <div class="dropdown-section">
                                        <label>Adultos</label>
                                        <div class="counter">
                                            <button type="button" class="counter-btn" data-action="decrement">−</button>
                                            <span id="adultsCount">1</span>
                                            <button type="button" class="counter-btn" data-action="increment">+</button>
                                        </div>
                                    </div>
                                    <div class="dropdown-section">
                                        <label>Classe</label>
                                        <div class="class-options">
                                            <label class="radio-label">
                                                <input type="radio" name="flightClass" value="Econômica" checked> Econômica
                                            </label>
                                            <label class="radio-label">
                                                <input type="radio" name="flightClass" value="Executiva"> Executiva
                                            </label>
                                        </div>
                                    </div>
                                    <button type="button" class="btn-apply" id="applyPassengers">Aplicar</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-row mode-fields" id="priceFields" style="display: none;">
                        <div class="input-field">
                            <label for="priceFrom">Origem</label>
                            <div class="input-icon">
                                <input type="text" id="priceFrom" name="priceFrom" placeholder="Sua cidade" list="cidadesList" required>
                            </div>
                        </div>

                        <div class="input-field">
                            <label for="maxPrice">Valor máximo (R$)</label>
                            <div class="input-icon">
                                <input type="number" id="maxPrice" name="maxPrice" placeholder="Ex: 1500" min="0" step="50" required>
                            </div>
                        </div>

                        <div class="input-field" id="pricePassengerField">
                            <label for="pricePassengersTrigger">Quantos passageiros?</label>
                            <div class="passenger-selector">
                                <div class="selector-trigger" id="pricePassengersTrigger">
                                    <span id="pricePassengersDisplay">1 adulto</span>
                                    <span class="arrow">▼</span>
                                </div>
                                <div class="selector-dropdown" id="pricePassengersDropdown">
                                    <div class="dropdown-section">
                                        <label>Adultos</label>
                                        <div class="counter">
                                            <button type="button" class="counter-btn" data-action="decrement-price">−</button>
                                            <span id="priceAdultsCount">1</span>
                                            <button type="button" class="counter-btn" data-action="increment-price">+</button>
                                        </div>
                                    </div>
                                    <button type="button" class="btn-apply" id="applyPricePassengers">Aplicar</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-search" id="searchButton">Buscar voos</button>
                </form>

                <!-- Datalist com as cidades existentes no backend -->
                <datalist id="cidadesList">
                    <option value="São Paulo">GRU / CGH / VCP</option>
                    <option value="Rio de Janeiro">GIG / SDU</option>
                    <option value="Brasília">BSB</option>
                    <option value="Salvador">SSA</option>
                    <option value="Recife">REC</option>
                    <option value="Fortaleza">FOR</option>
                    <option value="Belo Horizonte">CNF / PLU</option>
                    <option value="Curitiba">CWB</option>
                    <option value="Porto Alegre">POA</option>
                    <option value="Manaus">MAO</option>
                    <option value="Maceió">MCZ</option>
                    <option value="Florianópolis">FLN</option>
                    <option value="Belém">BEL</option>
                    <option value="Vitória">VIX</option>

                    <option value="Santiago">SCL</option>
                    <option value="Buenos Aires">EZE</option>
                    <option value="Miami">MIA</option>
                    <option value="Nova York">JFK</option>

                    <option value="Lisboa">LIS</option>
                    <option value="Londres">LHR</option>
                    <option value="Paris">CDG</option>
                    <option value="Madri">MAD</option>
                    <option value="Amsterdã">AMS</option>
                    <option value="Frankfurt">FRA</option>
                    <option value="Milão">MXP</option>
                    <option value="Roma">FCO</option>
                    <option value="Zurique">ZRH</option>
                    <option value="Istambul">IST</option>
                    <option value="Viena">VIE</option>
                    <option value="Munique">MUC</option>
                    <option value="Atenas">ATH</option>
                    <option value="Barcelona">BCN</option>

                    <option value="Dubai">DXB</option>
                    <option value="Doha">DOH</option>
                    <option value="Tóquio">NRT</option>
                    <option value="Seul">ICN</option>
                    <option value="Singapura">SIN</option>
                    <option value="Pequim">PEK</option>
                    <option value="Xangai">PVG</option>
                    <option value="Hong Kong">HKG</option>
                    <option value="Bangkok">BKK</option>
                    <option value="Nova Delhi">DEL</option>
                    <option value="Taipé">TPE</option>
                    <option value="Kuala Lumpur">KUL</option>
                </datalist>

                <div id="resultadosBusca" class="resultados-busca" style="display: none;">
                    <div class="resultados-header">
                        <h3>Voos encontrados</h3>
                        <span id="quantidadeResultados"></span>
                    </div>
                    <div id="listaVoos" class="lista-voos"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="Public/Scripts/index.js"></script>
<script src="Public/Scripts/auth-header.js"></script>
</body>
</html>
