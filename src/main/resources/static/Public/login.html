<!--
    login.html
    Página de autenticação de usuário. Permite que usuários cadastrados
    acessem o sistema informando e‑mail e senha.
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeuVoo · Entrar</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/Public/FavIcon/foot.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/Public/FavIcon/foot.png">
    <link rel="shortcut icon" type="image/png" href="/Public/FavIcon/foot.png">
    <link rel="apple-touch-icon" type="image/png" href="/Public/FavIcon/foot.png">
    <link rel="stylesheet" href="Styles/index.css">
    <link rel="stylesheet" href="Styles/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-wrapper">
    <header class="main-header">
        <div class="header-container">
            <div class="logo">MeuVoo</div>
            <div class="user-area" id="authHeaderArea"></div>
        </div>
    </header>

    <nav class="nav-bar">
        <ul class="nav-links">
            <li><a href="../index.html">Passagens</a></li>
            <li><a href="carrinho.html">Carrinho</a></li>
            <li><a href="checkin.html">Check-in</a></li>
            <li><a href="minhas-viagens.html">Minhas viagens</a></li>
        </ul>
    </nav>

    <main class="auth-main">
        <div class="auth-container">
            <h1 class="auth-titulo">Entrar na sua conta</h1>
            <form id="loginForm" class="auth-form">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required autocomplete="email">
                </div>
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-auth">Entrar</button>
                <p class="auth-link">Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
            </form>
            <div id="mensagem" class="mensagem-auth"></div>
        </div>
    </main>
</div>

<script src="Scripts/login.js"></script>
<script src="Scripts/auth-header.js"></script>
</body>
</html>
