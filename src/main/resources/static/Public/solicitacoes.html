<!--
    solicitacoes.html
    Página de solicitações especiais. Permite que o usuário informe necessidades
    de acessibilidade (cadeira de rodas, acompanhante) e restrições alimentares
    (vegetariana, vegana, sem glúten, kosher) para cada passageiro do voo.
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeuVoo · Solicitações Especiais</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/Public/FavIcon/foot.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/Public/FavIcon/foot.png">
    <link rel="shortcut icon" type="image/png" href="/Public/FavIcon/foot.png">
    <link rel="apple-touch-icon" type="image/png" href="/Public/FavIcon/foot.png">
    <link rel="stylesheet" href="Styles/index.css">
    <link rel="stylesheet" href="Styles/solicitacoes.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-wrapper">
    <header class="main-header">
        <div class="header-container">
            <div class="logo">MeuVoo</div>
            <div class="user-area" id="authHeaderArea"></div>
        </div>
    </header>

    <nav class="nav-bar">
        <ul class="nav-links">
            <li><a href="../index.html">Passagens</a></li>
            <li><a href="carrinho.html">Carrinho</a></li>
            <li><a href="checkin.html">Check-in</a></li>
            <li><a href="minhas-viagens.html">Minhas viagens</a></li>
        </ul>
    </nav>

    <main class="solicitacoes-main">
        <div class="solicitacoes-container">
            <h1 class="solicitacoes-titulo">Solicitações Especiais</h1>
            <div id="vooInfo" class="voo-info-resumo"></div>

            <form id="formSolicitacoes">
                <div id="listaPassageiros" class="lista-passageiros"></div>

                <div class="solicitacoes-acoes">
                    <button type="button" class="btn-cancelar" id="btnCancelar">Cancelar</button>
                    <button type="submit" class="btn-salvar" id="btnSalvar">Salvar</button>
                </div>
            </form>
        </div>
    </main>
</div>

<script src="Scripts/solicitacoes.js"></script>
<script src="Scripts/auth-header.js"></script>
</body>
</html>
