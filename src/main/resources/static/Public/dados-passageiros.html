<!--
    dados-passageiros.html
    Página de preenchimento dos dados dos passageiros após a finalização da compra.
    Coleta nome, e-mail, data de nascimento, CPF e passaporte de cada passageiro
    e envia as informações para confirmação da reserva.
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeuVoo · Dados dos Passageiros</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/Public/FavIcon/foot.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/Public/FavIcon/foot.png">
    <link rel="shortcut icon" type="image/png" href="/Public/FavIcon/foot.png">
    <link rel="apple-touch-icon" type="image/png" href="/Public/FavIcon/foot.png">
    <link rel="stylesheet" href="Styles/index.css">
    <link rel="stylesheet" href="Styles/dados-passageiros.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-wrapper">
    <header class="main-header">
        <div class="header-container">
            <div class="logo">MeuVoo</div>
            <div class="user-area" id="authHeaderArea"></div>
        </div>
    </header>

    <nav class="nav-bar">
        <ul class="nav-links">
            <li><a href="../index.html">Passagens</a></li>
            <li><a href="carrinho.html">Carrinho</a></li>
            <li><a href="checkin.html">Check-in</a></li>
            <li><a href="minhas-viagens.html">Minhas viagens</a></li>
        </ul>
    </nav>

    <main class="dados-main">
        <div class="dados-container">
            <h1 class="dados-titulo">Dados dos Passageiros</h1>
            <p>Preencha os dados de todos os passageiros para concluir a reserva.</p>

            <div id="reservasContainer"></div>

            <div class="dados-acoes">
                <button class="btn-cancelar" id="btnCancelar">Cancelar</button>
                <button class="btn-confirmar" id="btnConfirmar">Confirmar reserva</button>
            </div>
        </div>
    </main>
</div>

<script src="Scripts/auth-header.js"></script>
<script src="Scripts/dados-passageiros.js"></script>
</body>
</html>
