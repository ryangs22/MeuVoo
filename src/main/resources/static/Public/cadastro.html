<!--
    cadastro.html
    Página de cadastro de novo usuário. Permite criar uma conta informando
    nome, e-mail, CPF e senha. Os dados são enviados para o backend via API.
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeuVoo · Cadastro</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/Public/FavIcon/foot.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/Public/FavIcon/foot.png">
    <link rel="shortcut icon" type="image/png" href="/Public/FavIcon/foot.png">
    <link rel="apple-touch-icon" type="image/png" href="/Public/FavIcon/foot.png">
    <link rel="stylesheet" href="Styles/index.css">
    <link rel="stylesheet" href="Styles/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-wrapper">
    <header class="main-header">
        <div class="header-container">
            <div class="logo">MeuVoo</div>
            <div class="user-area" id="authHeaderArea"></div>
        </div>
    </header>

    <nav class="nav-bar">
        <ul class="nav-links">
            <li><a href="../index.html">Passagens</a></li>
            <li><a href="carrinho.html">Carrinho</a></li>
            <li><a href="checkin.html">Check-in</a></li>
            <li><a href="minhas-viagens.html">Minhas viagens</a></li>
        </ul>
    </nav>

    <main class="auth-main">
        <div class="auth-container">
            <h1 class="auth-titulo">Criar nova conta</h1>
            <form id="cadastroForm" class="auth-form">
                <div class="input-group">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" name="nome" required autocomplete="name">
                </div>
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required autocomplete="email">
                </div>
                <div class="input-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00">
                </div>
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" required minlength="6">
                </div>
                <div class="input-group">
                    <label for="confirmPassword">Confirmar senha</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>
                <button type="submit" class="btn-auth">Cadastrar</button>
                <p class="auth-link">Já tem uma conta? <a href="login.html">Entrar</a></p>
            </form>
            <div id="mensagem" class="mensagem-auth"></div>
        </div>
    </main>
</div>

<script src="Scripts/cadastro.js"></script>
<script src="Scripts/auth-header.js"></script>
</body>
</html>
